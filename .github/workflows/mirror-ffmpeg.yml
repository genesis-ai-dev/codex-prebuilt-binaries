name: Mirror FFmpeg prebuilt binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag for the @codex-editor/ffmpeg-* packages"
        required: true
        default: "1.0.0"
      ffmpeg_source_tag:
        description: "FFmpeg source tag to compile (for from-source builds)"
        required: true
        default: "n7.1"

env:
  SCOPE: "@codex-editor"

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Validate NPM_TOKEN
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm whoami || { echo "::error::NPM_TOKEN secret is expired or missing"; exit 1; }

      - name: Mirror @ffmpeg-installer platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          declare -A FFMPEG_PACKAGES=(
            ["darwin-arm64"]="@ffmpeg-installer/darwin-arm64@4.1.5"
            ["darwin-x64"]="@ffmpeg-installer/darwin-x64@4.1.0"
            ["linux-arm64"]="@ffmpeg-installer/linux-arm64@4.1.4"
            ["linux-arm"]="@ffmpeg-installer/linux-arm@4.1.3"
            ["linux-x64"]="@ffmpeg-installer/linux-x64@4.1.0"
            ["win32-x64"]="@ffmpeg-installer/win32-x64@4.1.0"
          )

          mkdir -p release-assets

          for PLATFORM in "${!FFMPEG_PACKAGES[@]}"; do
            SRC_PKG="${FFMPEG_PACKAGES[$PLATFORM]}"
            DEST_PKG="${SCOPE}/ffmpeg-${PLATFORM}"
            VERSION="${{ inputs.version }}"

            echo "=== Processing ${PLATFORM} (from ${SRC_PKG}) ==="

            if npm view "${DEST_PKG}@${VERSION}" version 2>/dev/null; then
              echo "Already published ${DEST_PKG}@${VERSION} — skipping"
              continue
            fi

            mkdir -p "work/${PLATFORM}"
            npm pack "${SRC_PKG}" --pack-destination "work/${PLATFORM}"
            TARBALL=$(ls "work/${PLATFORM}"/*.tgz)
            tar -xzf "${TARBALL}" -C "work/${PLATFORM}"

            FFMPEG_BIN=$(find "work/${PLATFORM}/package" -type f \( -name 'ffmpeg' -o -name 'ffmpeg.exe' \) | head -1)
            if [ -z "${FFMPEG_BIN}" ]; then
              echo "::warning::Could not find ffmpeg binary in ${SRC_PKG} — skipping ${PLATFORM}"
              continue
            fi

            GPL_DETECTED=false
            case "${PLATFORM}" in
              linux-*)
                chmod +x "${FFMPEG_BIN}"
                VERSION_OUTPUT=$("${FFMPEG_BIN}" -version 2>&1 || true)
                if echo "${VERSION_OUTPUT}" | grep -q -- '--enable-gpl'; then
                  GPL_DETECTED=true
                fi
                ;;
              *)
                if strings "${FFMPEG_BIN}" 2>/dev/null | grep -q -- '--enable-gpl'; then
                  GPL_DETECTED=true
                fi
                ;;
            esac

            if [ "${GPL_DETECTED}" = "true" ]; then
              echo "::warning::${PLATFORM} ffmpeg binary contains --enable-gpl — SKIPPING (LGPL required)"
              continue
            fi
            echo "GPL check passed for ${PLATFORM}"

            mkdir -p "repackage/${PLATFORM}"
            cp "${FFMPEG_BIN}" "repackage/${PLATFORM}/"
            cp LICENSES/ffmpeg-LGPL-2.1.txt "repackage/${PLATFORM}/LICENSE"
            tar -czf "ffmpeg-${PLATFORM}.tar.gz" -C "repackage/${PLATFORM}" .
            cp "ffmpeg-${PLATFORM}.tar.gz" release-assets/

            mkdir -p "pkg/${PLATFORM}"
            tar -xzf "ffmpeg-${PLATFORM}.tar.gz" -C "pkg/${PLATFORM}"

            cat > "pkg/${PLATFORM}/package.json" <<PKGJSON
          {
            "name": "${DEST_PKG}",
            "version": "${VERSION}",
            "description": "Prebuilt ffmpeg binary for ${PLATFORM}",
            "license": "LGPL-2.1",
            "files": ["**/*"]
          }
          PKGJSON

            cd "pkg/${PLATFORM}"
            npm publish --access public
            cd ../..

            echo "Published ${DEST_PKG}@${VERSION}"
          done

      - name: Upload mirrored tarballs
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-mirrored
          path: release-assets/
          if-no-files-found: ignore

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Validate NPM_TOKEN
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm whoami || { echo "::error::NPM_TOKEN secret is expired or missing"; exit 1; }

      - name: Check if already published
        id: check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG="${SCOPE}/ffmpeg-linux-x64"
          VERSION="${{ inputs.version }}"
          if npm view "${PKG}@${VERSION}" version 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Package ${PKG}@${VERSION} already published — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build dependencies
        if: steps.check.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm yasm pkg-config

      - name: Clone and build FFmpeg (LGPL only)
        if: steps.check.outputs.skip != 'true'
        run: |
          FFMPEG_TAG="${{ inputs.ffmpeg_source_tag }}"
          git clone --depth 1 --branch "${FFMPEG_TAG}" https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          ./configure \
            --disable-doc \
            --disable-ffplay --disable-ffprobe \
            --disable-network \
            --disable-debug \
            --enable-small \
            --prefix="$PWD/install"
          make -j$(nproc)
          make install

      - name: Verify LGPL compliance
        if: steps.check.outputs.skip != 'true'
        run: |
          chmod +x ffmpeg-src/install/bin/ffmpeg
          VERSION_OUTPUT=$(ffmpeg-src/install/bin/ffmpeg -version 2>&1 || true)
          echo "${VERSION_OUTPUT}"
          if echo "${VERSION_OUTPUT}" | grep -q -- '--enable-gpl'; then
            echo "::error::Compiled ffmpeg binary contains --enable-gpl — build misconfigured"
            exit 1
          fi
          echo "LGPL compliance check passed"

      - name: Package with LICENSE
        if: steps.check.outputs.skip != 'true'
        run: |
          mkdir -p repackage
          cp ffmpeg-src/install/bin/ffmpeg repackage/
          chmod +x repackage/ffmpeg
          cp LICENSES/ffmpeg-LGPL-2.1.txt repackage/LICENSE
          tar -czf ffmpeg-linux-x64.tar.gz -C repackage .

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          PKG_NAME="${SCOPE}/ffmpeg-linux-x64"

          mkdir -p pkg
          tar -xzf ffmpeg-linux-x64.tar.gz -C pkg

          cat > pkg/package.json <<PKGJSON
          {
            "name": "${PKG_NAME}",
            "version": "${VERSION}",
            "description": "Prebuilt LGPL ffmpeg binary for linux-x64 (compiled from source)",
            "license": "LGPL-2.1",
            "files": ["**/*"]
          }
          PKGJSON

          cd pkg
          npm publish --access public

      - name: Upload tarball artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-x64
          path: ffmpeg-linux-x64.tar.gz

  build-win32-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Validate NPM_TOKEN
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm whoami || { echo "::error::NPM_TOKEN secret is expired or missing"; exit 1; }

      - name: Check if already published
        id: check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG="${SCOPE}/ffmpeg-win32-x64"
          VERSION="${{ inputs.version }}"
          if npm view "${PKG}@${VERSION}" version 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Package ${PKG}@${VERSION} already published — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install cross-compiler
        if: steps.check.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 nasm yasm

      - name: Clone and cross-compile FFmpeg for win32-x64 (LGPL only)
        if: steps.check.outputs.skip != 'true'
        run: |
          FFMPEG_TAG="${{ inputs.ffmpeg_source_tag }}"
          git clone --depth 1 --branch "${FFMPEG_TAG}" https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          ./configure \
            --arch=x86_64 \
            --target-os=mingw32 \
            --cross-prefix=x86_64-w64-mingw32- \
            --disable-doc \
            --disable-ffplay --disable-ffprobe \
            --disable-network \
            --disable-debug \
            --enable-small \
            --enable-cross-compile \
            --prefix="$PWD/install"
          make -j$(nproc)
          make install

      - name: Verify LGPL compliance
        if: steps.check.outputs.skip != 'true'
        run: |
          if strings ffmpeg-src/install/bin/ffmpeg.exe 2>/dev/null | grep -q -- '--enable-gpl'; then
            echo "::error::Cross-compiled ffmpeg.exe contains --enable-gpl — build misconfigured"
            exit 1
          fi
          echo "LGPL compliance check passed"

      - name: Package with LICENSE
        if: steps.check.outputs.skip != 'true'
        run: |
          mkdir -p repackage
          cp ffmpeg-src/install/bin/ffmpeg.exe repackage/
          cp LICENSES/ffmpeg-LGPL-2.1.txt repackage/LICENSE
          tar -czf ffmpeg-win32-x64.tar.gz -C repackage .

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          PKG_NAME="${SCOPE}/ffmpeg-win32-x64"

          mkdir -p pkg
          tar -xzf ffmpeg-win32-x64.tar.gz -C pkg

          cat > pkg/package.json <<PKGJSON
          {
            "name": "${PKG_NAME}",
            "version": "${VERSION}",
            "description": "Prebuilt LGPL ffmpeg binary for win32-x64 (cross-compiled from source)",
            "license": "LGPL-2.1",
            "files": ["**/*"]
          }
          PKGJSON

          cd pkg
          npm publish --access public

      - name: Upload tarball artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-win32-x64
          path: ffmpeg-win32-x64.tar.gz

  build-win32-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Validate NPM_TOKEN
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm whoami || { echo "::error::NPM_TOKEN secret is expired or missing"; exit 1; }

      - name: Check if already published
        id: check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG="${SCOPE}/ffmpeg-win32-arm64"
          VERSION="${{ inputs.version }}"
          if npm view "${PKG}@${VERSION}" version 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Package ${PKG}@${VERSION} already published — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install llvm-mingw toolchain for ARM64 cross-compilation
        if: steps.check.outputs.skip != 'true'
        run: |
          LLVM_MINGW_URL="https://github.com/mstorsjo/llvm-mingw/releases/download/20250114/llvm-mingw-20250114-ucrt-ubuntu-20.04-x86_64.tar.xz"
          echo "Downloading llvm-mingw toolchain..."
          curl -fSL -o /tmp/llvm-mingw.tar.xz "${LLVM_MINGW_URL}"
          sudo mkdir -p /opt/llvm-mingw
          sudo tar -xJf /tmp/llvm-mingw.tar.xz -C /opt/llvm-mingw --strip-components=1
          rm /tmp/llvm-mingw.tar.xz
          echo "/opt/llvm-mingw/bin" >> "$GITHUB_PATH"
          aarch64-w64-mingw32-gcc --version

      - name: Clone and cross-compile FFmpeg for win32-arm64 (LGPL only)
        if: steps.check.outputs.skip != 'true'
        run: |
          FFMPEG_TAG="${{ inputs.ffmpeg_source_tag }}"
          git clone --depth 1 --branch "${FFMPEG_TAG}" https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          ./configure \
            --arch=aarch64 \
            --target-os=mingw32 \
            --cross-prefix=aarch64-w64-mingw32- \
            --disable-doc \
            --disable-ffplay --disable-ffprobe \
            --disable-network \
            --disable-debug \
            --enable-small \
            --enable-cross-compile \
            --prefix="$PWD/install"
          make -j$(nproc)
          make install

      - name: Verify LGPL compliance
        if: steps.check.outputs.skip != 'true'
        run: |
          if strings ffmpeg-src/install/bin/ffmpeg.exe 2>/dev/null | grep -q -- '--enable-gpl'; then
            echo "::error::Cross-compiled ffmpeg.exe contains --enable-gpl — build misconfigured"
            exit 1
          fi
          echo "LGPL compliance check passed"

      - name: Package with LICENSE
        if: steps.check.outputs.skip != 'true'
        run: |
          mkdir -p repackage
          cp ffmpeg-src/install/bin/ffmpeg.exe repackage/
          cp LICENSES/ffmpeg-LGPL-2.1.txt repackage/LICENSE
          tar -czf ffmpeg-win32-arm64.tar.gz -C repackage .

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          PKG_NAME="${SCOPE}/ffmpeg-win32-arm64"

          mkdir -p pkg
          tar -xzf ffmpeg-win32-arm64.tar.gz -C pkg

          cat > pkg/package.json <<PKGJSON
          {
            "name": "${PKG_NAME}",
            "version": "${VERSION}",
            "description": "Prebuilt LGPL ffmpeg binary for win32-arm64 (cross-compiled from source)",
            "license": "LGPL-2.1",
            "files": ["**/*"]
          }
          PKGJSON

          cd pkg
          npm publish --access public

      - name: Upload tarball artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-win32-arm64
          path: ffmpeg-win32-arm64.tar.gz

  release:
    needs: [mirror, build-linux-x64, build-win32-x64, build-win32-arm64]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="ffmpeg-v${{ inputs.version }}"
          if gh release view "${TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        if: steps.check_release.outputs.exists != 'true'
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: ffmpeg-*

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="ffmpeg-v${{ inputs.version }}"

          mkdir -p release-assets
          find artifacts -name '*.tar.gz' -exec cp {} release-assets/ \;

          if [ -z "$(ls -A release-assets/ 2>/dev/null)" ]; then
            echo "No assets to release"
            exit 0
          fi

          echo "Release assets:"
          ls -la release-assets/

          gh release create "${TAG}" release-assets/*.tar.gz \
            --repo "${{ github.repository }}" \
            --title "ffmpeg v${{ inputs.version }}" \
            --notes "Prebuilt LGPL-compliant ffmpeg binaries for all supported platforms.
          
          Mirrored from @ffmpeg-installer (LGPL builds only).
          Compiled from FFmpeg source ${{ inputs.ffmpeg_source_tag }} for platforms where upstream ships GPL builds."
